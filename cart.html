<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - MYShop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="cart.css">
</head>
<body>
    <header>
        <h1>🛍️ MYShop</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="product.html">Products</a>
            <a href="cart.html" class="active">Cart</a>
            <a href="login.html">Login</a>
        </nav>  
    </header>

    <section class="cart-container">
        <h2>Your Shopping Cart</h2>
        <div id="cart-items">
            <div class="cart-item">
                <p>Air purifier || - $10.00</p>
            </div>
            <div class="cart-item">
                <p>Soft toy || koala - $4.00</p>
            </div>
        </div>
        <h3 id="total">Total: $14.00</h3>
        <div class="cart-actions">
            <form action="index.html" method="GET" style="display:inline;">
                <button type="submit" id="checkout-btn">Proceed to Checkout</button>
            </form>
            <form action="cart.html" method="GET" style="display:inline;">
                <button type="submit" id="clear-cart-btn">Clear Cart</button>
            </form>
        </div>
    </section>

    <footer>
        <p>&copy; 2024 E-commerce Store. All rights reserved.</p>
    </footer>
</body>
</html>
