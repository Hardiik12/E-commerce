        <style>
            .product-list {
                padding: 20px;
            }
            .product-list .header {
                text-align: center;
                margin-bottom: 30px;
            }
            .product-list .products {
                display: flex;
                gap: 20px;
                justify-content: center;
                flex-wrap: wrap;
            }
            .product-item {
                border: 1px solid #ccc;
                border-radius: 8px;
                padding: 15px;
                text-align: center;
                width: 200px;
            }
            .product-item img {
                max-width: 100%;
                height: auto;
                border-radius: 8px;
            }
            .product-item h3 {
                margin: 10px 0;
            }
            .product-item p {
                font-size: 18px;
                color: #333;
            }
            .product-item button {
                background-color: #547cd0;
                color: #fff;
                border: none;
                padding: 10px 15px;
                border-radius: 5px;
                cursor: pointer;
            }
            .product-item button:hover {
                background-color: #112a62;
            }
        </style>
    </head>
