<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - MYShop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>🛍️ MYShop</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="product_list.html" class="active">Products</a>
            <a href="cart.html">Cart</a>
            <a href="login.html">Login</a>
        </nav>  
    </header>

    <section class="product-list">
        <div class="header">
            <h2>Product List</h2>
        </div>
        <div class="products">

            <div class="product-item">
                <img src="img/product1.jpeg" alt="Product 1">
                <h3>Air purifier ||</h3>
                <p>$10.00</p>
                <a href="cart.html" class="btn">Add to Cart</a>
            </div>

            <div class="product-item">
                <img src="img/product2.jpeg" alt="Product 2">
                <h3>Cosmetics</h3>
                <p>$15.00</p>
                <a href="cart.html" class="btn">Add to Cart</a>
            </div>

            <div class="product-item">
                <img src="img/product3.jpeg" alt="Product 3">
                <h3>Ordinary || pack of 4</h3>
                <p>$20.00</p>
                <a href="cart.html" class="btn">Add to Cart</a>
            </div>

            <div class="product-item">
                <img src="img/toys.jpeg" alt="toys">
                <h3>Soft toy || koala</h3>
                <p>$4.00</p> 
                <a href="cart.html" class="btn">Add to Cart</a>
            </div>

        </div>
    </section>

    <footer>
        <p>&copy; 2024 E-commerce Store. All rights reserved.</p>
    </footer>
</body>
</html>
